<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPort — Home</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>
    <nav>
        <span id="nav-user"></span>
        <div>
            <a href="/home.html">Home</a>
            <a href="/transfer.html">Transfer</a>
            <a href="/balance.html">Balance</a>
            <a href="/history.html">History</a>
            <a href="#" onclick="logout()">Logout</a>
            <a href="/profile.html">Profile</a>
        </div>
    </nav>

    <div class="container">
        <h1>Welcome back 👋</h1>
        <p id="welcome-msg" style="text-align:center; color:#bbbbbb; margin-bottom:30px"></p>

        <div class="card-grid">
            <div class="card" onclick="window.location.href='/transfer.html'">
                <div class="card-icon">💸</div>
                <div class="card-title">Transfer</div>
                <div class="card-desc">Send money to any UPI ID</div>
            </div>
            <div class="card" onclick="window.location.href='/balance.html'">
                <div class="card-icon">💰</div>
                <div class="card-title">Balance</div>
                <div class="card-desc">Check your account balance</div>
            </div>
            <div class="card" onclick="window.location.href='/history.html'">
                <div class="card-icon">📜</div>
                <div class="card-title">History</div>
                <div class="card-desc">View transaction history</div>
            </div>
        </div>
    </div>

    <canvas id="bgCanvas"></canvas>
    <script src="/js/auth.js"></script>
    <script src="/js/particles.js"></script>
    <script>
        requireAuth();
        const user = getUser();
        if (user) {
            document.getElementById('nav-user').textContent = user.name;
            document.getElementById('welcome-msg').textContent = 'Logged in as ' + user.mobileNumber;
        }
    </script>
</body>
</html>
