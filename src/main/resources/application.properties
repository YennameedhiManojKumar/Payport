spring.application.name=payport
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Railway uses MYSQL_URL, local dev uses individual vars
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/payport_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root123}