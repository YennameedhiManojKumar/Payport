# Dev datasource
spring.datasource.url=jdbc:mysql://localhost:3306/payport_db
spring.datasource.username=root
spring.datasource.password=root123

# Show SQL in dev only
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use update in dev so Hibernate creates/alters tables automatically
spring.jpa.hibernate.ddl-auto=update

# Dev JWT secret — only for local use
JWT_SECRET=dev-payport-secret-key-minimum-32-characters-long

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR