# Prod datasource — all values from AWS environment variables
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}

# Never auto-alter schema in production
spring.jpa.hibernate.ddl-auto=validate

# Prod JWT secret — set as environment variable on EC2, never hardcoded
# JWT_SECRET must be set in the EC2 environment