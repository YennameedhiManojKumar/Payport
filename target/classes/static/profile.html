<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPort — Profile</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>
    <nav>
        <span id="nav-user"></span>
        <div>
            <a href="/home.html">Home</a>
            <a href="/transfer.html">Transfer</a>
            <a href="/balance.html">Balance</a>
            <a href="/history.html">History</a>
            <a href="/profile.html">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>My Profile</h2>
        <div class="profile-card">
            <div class="profile-avatar" id="avatar"></div>
            <div class="profile-info">
                <div class="profile-row">
                    <span class="profile-label">Name</span>
                    <span class="profile-value" id="prof-name"></span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">Mobile</span>
                    <span class="profile-value" id="prof-mobile"></span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">UPI ID</span>
                    <span class="profile-value" id="prof-upi"></span>
                </div>
            </div>
        </div>
        <button onclick="logout()" style="margin-top:24px; background: linear-gradient(90deg,#ff6b6b,#ff4444)">
            Logout
        </button>
    </div>

    <canvas id="bgCanvas"></canvas>
    <script src="/js/auth.js"></script>
    <script src="/js/particles.js"></script>
    <script>
        requireAuth();
        const user = getUser();
        if (user) {
            document.getElementById('nav-user').textContent = user.name;
            document.getElementById('prof-name').textContent = user.name;
            document.getElementById('prof-mobile').textContent = user.mobileNumber;
            document.getElementById('prof-upi').textContent = user.upiId;
            document.getElementById('avatar').textContent = user.name.charAt(0).toUpperCase();
        }
    </script>
</body>
</html>
