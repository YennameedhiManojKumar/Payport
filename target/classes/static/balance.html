<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPort — Balance</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>
    <nav>
        <span id="nav-user"></span>
        <div>
            <a href="/home.html">Home</a>
            <a href="/transfer.html">Transfer</a>
            <a href="/balance.html">Balance</a>
            <a href="/history.html">History</a>
            <a href="/profile.html">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Check Balance</h2>
        <form id="balanceForm">
            <label>Your UPI ID</label>
            <input type="text" id="upiId" readonly
                   style="opacity:0.6; cursor:not-allowed;">
            <label>UPI PIN</label>
            <input type="password" id="pin" placeholder="Enter your UPI PIN"
                   maxlength="6" inputmode="numeric" required>
            <button type="submit">Check Balance</button>
        </form>
        <p id="message"></p>
    </div>

    <canvas id="bgCanvas"></canvas>
    <script src="/js/auth.js"></script>
    <script src="/js/particles.js"></script>
    <script src="/js/balance.js"></script>
</body>
</html>
